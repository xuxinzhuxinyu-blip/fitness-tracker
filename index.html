<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>健身训练</title>
<style>
:root {
  --bg:#000; --bg-card:#111112; --bg-input:#1c1c1e; --accent:#ff2d55;
  --accent2:#ff6b35; --text:#fff; --text2:#8e8e93; --border:#2c2c2e;
  --blue:#4a90d9; --green:#4caf84; --yellow:#d4a843;
  --radius:14px; --sf:-apple-system,'SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:var(--sf); background:var(--bg); color:var(--text);
  height:100vh; height:100dvh; overflow:hidden;
  user-select:none; -webkit-user-select:none;
  -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased;
}
.page {
  position:fixed; top:0; left:0; width:100%; height:100%; height:100dvh;
  display:none;
}
body.s1 #p-heart{ display:flex; flex-direction:column; align-items:center; justify-content:center; }
body.s2 #p-cal{ display:flex; flex-direction:column; overflow-y:auto; }
body.s3 #p-mode{ display:flex; flex-direction:column; overflow-y:auto; }
body.s4 #p-detail{ display:flex; flex-direction:column; }

.heart-nav{ width:100%; display:flex; justify-content:space-between; align-items:center; padding:60px 20px 0; }
.heart-nav .icon-btn{ width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.08);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center; }
.heart-nav .nav-title{ font-size:15px;font-weight:600;letter-spacing:.3px; }
.heart-nav .nav-subtitle{ font-size:13px;color:var(--text2); }
.heart-area{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; width:100%; }
#heartCanvas{ width:200px;height:200px; cursor:pointer; }
.ecg-wrap{ width:100%; max-width:320px; height:70px; margin-top:-8px; }
#ecgCanvas{ width:100%;height:100%;display:block; }
.hr-row{ display:flex; align-items:baseline; gap:4px; margin-top:6px; }
.hr-val{ font-size:52px;font-weight:200;letter-spacing:-2px; }
.hr-unit{ font-size:14px;color:var(--accent);font-weight:500; }
.status-lbl{ font-size:13px;color:var(--text2);margin-top:4px;letter-spacing:.5px; }
.status-lbl .pdot{ display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--accent);margin-right:6px;vertical-align:middle;animation:pdot 1.2s ease-in-out infinite; }
@keyframes pdot{ 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }
.press-ring{ position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:240px;height:240px;pointer-events:none; }
.press-ring circle{ fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;stroke-dasharray:754;stroke-dashoffset:754;opacity:0; }
.press-ring.on circle{ opacity:1; }
.hint-txt{ font-size:12px;color:rgba(255,255,255,.25);margin-top:20px;letter-spacing:.8px;transition:opacity .6s; }

.stats-row{ display:flex; gap:0; width:100%; max-width:320px; padding:0 16px 34px; }
.stats-row .st{ flex:1;text-align:center; }
.stats-row .st-val{ font-size:20px;font-weight:600; }
.stats-row .st-lbl{ font-size:11px;color:var(--text2);margin-top:2px;letter-spacing:.3px; }

/* ---- PAGE 2: CALENDAR ---- */
#p-cal{ z-index:2; }
/* ---- PAGE 3: MODE ---- */
#p-mode{ z-index:3; }
/* ---- PAGE 4: DETAIL ---- */
#p-detail{ z-index:4; }

.cal-head{ padding:60px 16px 12px; text-align:center; position:sticky; top:0; z-index:10; background:linear-gradient(180deg,var(--bg) 60%,transparent); }
.cal-head h2{ font-size:20px; background:linear-gradient(135deg,var(--accent2),#ff9a56); -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; margin-bottom:4px; }
.cal-head .sub{ font-size:12px; color:var(--text2); }
.month-nav{ display:flex;align-items:center;justify-content:center;gap:14px;margin:14px 0 6px; }
.month-nav button{ background:var(--bg-input);border:1px solid var(--border);color:var(--text);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:16px;transition:all .2s;display:flex;align-items:center;justify-content:center; }
.month-nav button:active{ background:var(--accent2);border-color:var(--accent2); }
.month-nav .mlabel{ font-size:17px;font-weight:700;min-width:130px;text-align:center; }
.month-nav .tbtn{ font-size:12px;width:auto;height:26px;padding:0 12px;border-radius:13px; }
.wkdays{ display:grid;grid-template-columns:repeat(7,1fr);max-width:480px;margin:0 auto;padding:6px 8px 2px;text-align:center;font-size:12px;color:var(--text2);font-weight:600; }
.wkdays .we{ color:var(--accent2); }
.cal-grid{ display:grid;grid-template-columns:repeat(7,1fr);max-width:480px;margin:0 auto;padding:0 8px;gap:3px; }
.cal-cell{ aspect-ratio:1;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:14px;font-weight:500;background:transparent;border:1px solid transparent; }
.cal-cell:active{ transform:scale(.95); }
.cal-cell.om{ color:#333;pointer-events:none; }
.cal-cell.td{ border-color:var(--accent2);background:rgba(255,107,53,.08); }
.cal-cell.td .dn{ color:var(--accent2);font-weight:700; }
.cal-dots{ display:flex;gap:2px;margin-top:1px; }
.cal-dot{ width:4px;height:4px;border-radius:50%; }
.cal-dot.tr{ background:var(--blue); }
.cal-dot.bd{ background:var(--green); }
.cal-dot.dr{ background:var(--yellow); }
.c-leg{ max-width:480px;margin:10px auto 0;padding:0 16px;display:flex;gap:14px;justify-content:center;font-size:11px;color:var(--text2); }
.c-leg span{ display:flex;align-items:center;gap:4px; }
.c-leg .ld{ width:7px;height:7px;border-radius:50%;display:inline-block; }
.c-stats{ max-width:480px;margin:12px auto 0;padding:0 16px;display:flex;gap:6px; }
.c-stats .sc{ flex:1;background:var(--bg-card);border-radius:var(--radius);padding:10px;text-align:center;border:1px solid var(--border); }
.c-stats .sc .sn{ font-size:20px;font-weight:700;color:var(--accent2); }
.c-stats .sc .sl{ font-size:10px;color:var(--text2);margin-top:2px; }

.mode-head{ display:flex;align-items:center;gap:10px;padding:60px 16px 10px;position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--bg) 60%,transparent); }
.mode-head .back-btn{ background:var(--bg-input);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.mode-head .mh-title{ font-size:19px;font-weight:700; }
.mode-head .mh-date{ font-size:13px;color:var(--text2);margin-left:auto; }
.mode-grid{ display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:480px;margin:12px auto;padding:0 16px; }
.mode-card{ background:var(--bg-card);border-radius:var(--radius);padding:18px 14px;text-align:center;cursor:pointer;border:2px solid var(--border);transition:all .2s; }
.mode-card:active{ transform:scale(.96); }
.mode-card .mc-icon{ width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:24px; }
.mode-card .mc-name{ font-size:14px;font-weight:700;margin-bottom:4px; }
.mode-card .mc-desc{ font-size:11px;color:var(--text2);line-height:1.5; }

.dt-head{ display:flex;align-items:center;gap:10px;padding:60px 16px 10px;position:sticky;top:0;z-index:10;background:linear-gradient(180deg,var(--bg) 60%,transparent); }
.dt-head .back-btn{ background:var(--bg-input);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0; }
.dt-head .dt-date{ font-size:17px;font-weight:700;flex:1; }
.dt-tabs{ display:flex;gap:0;padding:0 16px;max-width:600px;margin:0 auto; }
.dt-tabs .tab{ flex:1;padding:10px 4px;background:transparent;border:none;color:var(--text2);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:all .3s;white-space:nowrap;font-family:inherit; }
.dt-tabs .tab.on{ color:var(--accent2);border-bottom-color:var(--accent2); }
.dt-main{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; max-width:600px;width:100%;margin:0 auto;padding:12px 16px 120px; }
.dt-tab{ display:none; }
.dt-tab.on{ display:block; }

.mode-badge{ display:inline-flex;align-items:center;gap:4px;background:rgba(255,107,53,.12);color:var(--accent2);padding:5px 14px;border-radius:14px;font-size:12px;font-weight:600;margin-bottom:10px; }
.ex-card{ background:var(--bg-card);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;border:1px solid var(--border);border-left:3px solid var(--accent2); }
.ex-card .ex-top{ display:flex;align-items:center;gap:8px;padding:12px 14px 8px; }
.ex-card .ex-icon{ width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0; }
.ex-card .ex-info{ flex:1;min-width:0; }
.ex-card .ex-name{ font-size:14px;font-weight:700; }
.ex-card .ex-meta{ font-size:11px;color:var(--text2);margin-top:2px; }
.ex-card .ex-del{ background:transparent;border:none;color:var(--text2);font-size:16px;cursor:pointer;padding:4px 6px;border-radius:4px; }
.sets-wrap{ padding:0 14px 12px; transition:max-height .3s ease; max-height:3000px; overflow:hidden; }
.sets-wrap.folded{ max-height:0; padding-top:0; padding-bottom:0; }
.set-row{ display:flex;align-items:center;gap:6px;padding:8px 10px;margin-bottom:5px;background:var(--bg-input);border-radius:8px; }
.set-row .snum{ font-size:11px;color:var(--text2);font-weight:600;width:32px;flex-shrink:0; }
.set-row .sval{ flex:1;display:flex;align-items:center;gap:4px;font-size:14px;font-weight:600; }
.set-row .kg{ color:var(--accent2);min-width:28px; }
.set-row .reps{ color:var(--text); }
.set-row .slbl{ font-size:10px;color:var(--text2); }
.set-row .sdel{ background:transparent;border:none;color:var(--text2);cursor:pointer;font-size:14px;padding:2px 4px; }
.add-set-row{ display:flex;align-items:center;gap:6px;padding:8px 10px;background:rgba(255,107,53,.04);border:1px dashed var(--accent2);border-radius:8px; }
.add-set-row input{ width:56px;padding:6px 4px;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;font-weight:600;text-align:center;font-family:inherit; }
.add-set-row input:focus{ outline:none;border-color:var(--accent2); }
.add-set-row .as-btn{ padding:6px 12px;background:var(--accent2);color:#fff;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit; }
.add-set-row .as-btn:active{ transform:scale(.96); }

.btn-add-ex{ width:100%;padding:12px;background:transparent;border:1px dashed var(--border);border-radius:var(--radius);color:var(--text2);font-size:14px;cursor:pointer;font-family:inherit;margin-top:4px; }
.btn-add-ex:active{ background:var(--bg-input); }
.qa{ background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--accent2);border-radius:var(--radius);padding:14px;margin-bottom:10px; }
.qa input,.qa select{ width:100%;padding:10px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;margin-bottom:8px; }
.qa select{ -webkit-appearance:none; }
.qa .qa-btns{ display:flex;gap:8px; }
.qa .qa-btns button{ flex:1;padding:10px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;border:none; }
.qa .qa-save{ background:var(--accent2);color:#fff; }
.qa .qa-cancel{ background:var(--bg-input);color:var(--text2);border:1px solid var(--border)!important; }

.arr-btn{ background:transparent;border:none;color:var(--text2);font-size:12px;cursor:pointer;padding:4px 6px;border-radius:4px;transition:all .3s;flex-shrink:0; }
.arr-btn.up{ transform:rotate(180deg); }

.card{ background:var(--bg-card);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border); }
.card h3{ font-size:14px;margin-bottom:10px;color:var(--accent2); }
label{ display:block;font-size:12px;color:var(--text2);margin-bottom:3px;margin-top:8px; }
input,textarea,select{ width:100%;padding:10px;background:var(--bg-input);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:14px;font-family:inherit;-webkit-appearance:none; }
input:focus,textarea:focus{ outline:none;border-color:var(--accent2); }
textarea{ resize:vertical;min-height:50px; }
.mgrid{ display:grid;grid-template-columns:1fr 1fr;gap:6px 10px; }
.btn{ display:inline-flex;align-items:center;justify-content:center;gap:4px;padding:10px 16px;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s; }
.btn-p{ background:var(--accent2);color:#fff;width:100%;margin-top:10px; }
.btn-p:active{ transform:scale(.98); }
.btn-sm{ padding:6px 12px;font-size:12px;background:var(--bg-input);color:var(--text);border:1px solid var(--border); }
.btn-d{ background:transparent;border:1px solid #e74c3c;color:#e74c3c; }
.hist-item{ background:var(--bg-card);border-radius:var(--radius);padding:10px 14px;margin-bottom:6px;border:1px solid var(--border); }
.hist-item .hl{ font-size:12px;color:var(--accent2);margin-bottom:3px;font-weight:600; }
.hist-item .sm{ font-size:12px;color:var(--text2); }
.hist-item .acts{ display:flex;gap:6px;margin-top:6px; }
.diary-card{ background:var(--bg-card);border-radius:var(--radius);padding:14px;margin-bottom:10px;border:1px solid var(--border); }
.diary-card .dd{ font-size:12px;color:var(--accent2);font-weight:600;margin-bottom:6px; }
.diary-card .dm{ display:flex;gap:14px;margin-bottom:6px;font-size:12px; }
.diary-card .ds{ margin-top:6px;padding-top:6px;border-top:1px solid var(--border); }
.diary-card .ds .lbl{ font-size:10px;color:var(--text2);margin-bottom:2px; }
.diary-card .ds .ct{ font-size:13px; }
.feel-grp{ display:flex;gap:6px;margin-top:6px; }
.feel-btn{ flex:1;padding:8px 2px;background:var(--bg-input);border:2px solid var(--border);border-radius:8px;cursor:pointer;font-size:22px;text-align:center;transition:all .2s; }
.feel-btn.sel{ border-color:var(--accent2);background:rgba(255,107,53,.15);transform:scale(1.05); }
.feel-lbl{ font-size:10px;display:block;margin-top:2px;color:var(--text2); }
.tgl-wrap{ display:flex;align-items:center;gap:10px;margin-top:8px; }
.tgl{ position:relative;width:44px;height:26px;background:var(--bg-input);border-radius:13px;cursor:pointer;border:2px solid var(--border);transition:all .3s; }
.tgl.on{ background:#4caf84;border-color:#4caf84; }
.tgl::after{ content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px;transition:transform .3s; }
.tgl.on::after{ transform:translateX(18px); }
.chart-box{ margin-top:12px;background:var(--bg-card);border-radius:var(--radius);padding:14px;border:1px solid var(--border); }
.chart-box h3{ font-size:13px;color:var(--accent2);margin-bottom:10px; }
canvas.cv{ width:100%;height:180px;display:block; }
.empty{ text-align:center;padding:32px 16px;color:var(--text2); }
.empty .eicon{ font-size:42px;margin-bottom:10px; }
.empty p{ font-size:13px; }

.save-fab{ position:fixed;bottom:30px;left:16px;right:16px;max-width:568px;margin:0 auto;padding:15px;background:var(--accent2);color:#fff;border:none;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 6px 24px rgba(255,107,53,.35);z-index:50;display:none; }
.save-fab:active{ transform:scale(.97); }

@media(max-width:480px){
  .cal-cell{font-size:13px;}
  .mgrid{grid-template-columns:1fr 1fr;}
}
</style>
</head>
<body class="s1">

<!-- ============== PAGE 1: HEART ============== -->
<div class="page" id="p-heart">
  <div class="heart-nav"><span></span><div style="text-align:center;"><div class="nav-title">健身训练</div><div class="nav-subtitle" id="todayLbl"></div></div><span></span></div>
  <div class="heart-area" id="heartArea">
    <canvas id="heartCanvas" width="400" height="400"></canvas>
    <svg class="press-ring" id="pressRing" viewBox="0 0 240 240"><circle cx="120" cy="120" r="120"/></svg>
    <div class="ecg-wrap"><canvas id="ecgCanvas" width="640" height="140"></canvas></div>
    <div class="hr-row"><span class="hr-val" id="hrVal">72</span><span class="hr-unit">BPM</span></div>
    <div class="status-lbl"><span class="pdot"></span>长按心脏进入训练日历</div>
    <div class="hint-txt" id="hintTxt">按住 · 2秒解锁</div>
  </div>
  <div class="stats-row">
    <div class="st"><div class="st-val" id="sWorkouts">0</div><div class="st-lbl">本月训练</div></div>
    <div class="st"><div class="st-val" id="sSets">0</div><div class="st-lbl">完成组数</div></div>
    <div class="st"><div class="st-val" id="sStreak">0</div><div class="st-lbl">连续天数</div></div>
  </div>
</div>

<!-- ============== PAGE 2: CALENDAR ============== -->
<div class="page" id="p-cal">
  <div class="cal-head">
    <h2>💪 健身容量记录</h2>
    <p class="sub">点击日期选择训练模式</p>
    <div class="month-nav">
      <button onclick="prevM()">◀</button><span class="mlabel" id="mLbl"></span><button onclick="nextM()">▶</button>
      <button class="tbtn" onclick="goTodayM()">今天</button>
    </div>
  </div>
  <div class="wkdays"><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span class="we">六</span><span class="we">日</span></div>
  <div class="cal-grid" id="calGrid"></div>
  <div class="c-leg"><span><i class="ld" style="background:var(--blue)"></i>训练</span><span><i class="ld" style="background:var(--green)"></i>身体</span><span><i class="ld" style="background:var(--yellow)"></i>日记</span></div>
  <div class="c-stats"><div class="sc"><div class="sn" id="cTrain">0</div><div class="sl">本月训练天数</div></div><div class="sc"><div class="sn" id="cSets">0</div><div class="sl">本月总组数</div></div><div class="sc"><div class="sn" id="cDiary">0</div><div class="sl">本月日记数</div></div></div>
</div>

<!-- ============== PAGE 3: MODE ============== -->
<div class="page" id="p-mode">
  <div class="mode-head">
    <button class="back-btn" onclick="backToCal()">←</button>
    <span class="mh-title">选择训练模式</span>
    <span class="mh-date" id="modeDateLbl"></span>
  </div>
  <div class="mode-grid">
    <div class="mode-card" onclick="goDetail('normal')" style="border-left:3px solid var(--blue);">
      <div class="mc-icon" style="background:rgba(74,144,217,.15);">🎯</div><div class="mc-name">普通组</div><div class="mc-desc">固定重量训练<br>每组重量保持不变</div></div>
    <div class="mode-card" onclick="goDetail('pyramid-up')" style="border-left:3px solid #4caf84;">
      <div class="mc-icon" style="background:rgba(76,175,132,.15);">📈</div><div class="mc-name">递增组</div><div class="mc-desc">重量逐渐增加<br>每组比上一组更重</div></div>
    <div class="mode-card" onclick="goDetail('pyramid-down')" style="border-left:3px solid #e07b4c;">
      <div class="mc-icon" style="background:rgba(224,123,76,.15);">📉</div><div class="mc-name">递减组</div><div class="mc-desc">重量逐渐降低<br>每组比上一组更轻</div></div>
    <div class="mode-card" onclick="goDetail('superset')" style="border-left:3px solid #d4a843;">
      <div class="mc-icon" style="background:rgba(212,168,67,.15);">⚡</div><div class="mc-name">超级组</div><div class="mc-desc">两个动作连续完成<br>中间不休息</div></div>
  </div>
  <div style="max-width:480px;margin:14px auto 0;padding:0 16px;display:flex;gap:8px;">
    <button class="btn btn-sm" onclick="goDetailBody()" style="flex:1;padding:12px;">📊 身体数据</button>
    <button class="btn btn-sm" onclick="goDetailDiary()" style="flex:1;padding:12px;">📝 成长日记</button>
  </div>
</div>

<!-- ============== PAGE 4: DETAIL ============== -->
<div class="page" id="p-detail">
  <div class="dt-head">
    <button class="back-btn" onclick="backToMode()">←</button><span class="dt-date" id="dtDateLbl"></span>
  </div>
  <div class="dt-tabs">
    <button class="tab on" id="tab-train" onclick="switchTab('train')">🏋️ 训练</button>
    <button class="tab" id="tab-body" onclick="switchTab('body')">📊 身体</button>

<script>
// ===================== STORAGE =====================
var KEYS={tr:'ft_train',bd:'ft_body',dr:'ft_diary'};
function ld(k){try{return JSON.parse(localStorage.getItem(KEYS[k]))||[]}catch(e){return[]}}
function sd(k,d){localStorage.setItem(KEYS[k],JSON.stringify(d))}
function gid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8)}

var MUSCLE={胸:{ic:'🏋️',bg:'rgba(255,45,85,.15)',c:'#ff2d55'},背:{ic:'🔙',bg:'rgba(255,149,0,.15)',c:'#ff9500'},腿:{ic:'🦵',bg:'rgba(52,199,89,.15)',c:'#34c759'},肩:{ic:'💪',bg:'rgba(0,122,255,.15)',c:'#007aff'},手臂:{ic:'🦾',bg:'rgba(175,82,222,.15)',c:'#af52de'},腹:{ic:'🫃',bg:'rgba(255,45,85,.15)',c:'#ff2d55'},其他:{ic:'🏃',bg:'rgba(142,142,147,.15)',c:'#8e8e93'}};
var MODE_LAB={normal:'🎯 普通组','pyramid-up':'📈 递增组','pyramid-down':'📉 递减组',superset:'⚡ 超级组'};

// ===================== NAVIGATION =====================
var selDate=new Date().toISOString().slice(0,10);
var selMode='normal';
var exList=[];
var curM=new Date().getMonth(), curY=new Date().getFullYear();

function fmtDate(ds){
  var d=new Date(ds+'T00:00:00'), now=new Date();now.setHours(0,0,0,0);
  var t=new Date(d);t.setHours(0,0,0,0);var diff=Math.round((now-t)/86400000);
  var wd=['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
  var dp=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
  if(diff===0)return'今天 · '+dp+' '+wd;if(diff===1)return'昨天 · '+dp+' '+wd;return dp+' '+wd;
}

function setState(s){document.body.className='s'+s;}
function openCal(){setState(2);renderCal();}
function openMode(ds){selDate=ds;document.getElementById('modeDateLbl').textContent=fmtDate(ds);setState(3);}
function goDetail(mode){selMode=mode;document.getElementById('dtDateLbl').textContent=fmtDate(selDate);setState(4);switchTab('train');loadExForDate();refreshBodyH();refreshDiaryH();setTimeout(drawChart,200);}
function goDetailBody(){selMode='normal';document.getElementById('dtDateLbl').textContent=fmtDate(selDate);setState(4);switchTab('body');setTimeout(drawChart,200);}
function goDetailDiary(){selMode='normal';document.getElementById('dtDateLbl').textContent=fmtDate(selDate);setState(4);switchTab('diary');}
function backToCal(){setState(2);renderCal();}
function backToMode(){setState(3);}

// ===================== HEART 3D + ECG =====================
(function(){
  var cv=document.getElementById('heartCanvas'),ctx=cv.getContext('2d');
  var W=cv.width,H=cv.height,cx=W/2,cy=H/2,bp=0,bs=0,bps=72,bInt=60/bps*1000,lb=Date.now();
  function hp(u,v){var x=16*Math.pow(Math.sin(u),3),y=13*Math.cos(u)-5*Math.cos(2*u)-2*Math.cos(3*u)-Math.cos(4*u),cv2=Math.cos(v),sv=Math.sin(v);return{x:x*cv2*6,y:y*6+5,z:x*sv*6};}
  function draw(){
    ctx.clearRect(0,0,W,H);var pulse=1+bs*.06,layers=16;
    for(var li=0;li<layers;li++){var v=(li/layers)*Math.PI*2,cv2=Math.cos(v),inten=.3+.7*(1-Math.abs(v-Math.PI)/Math.PI);
    var r=Math.floor(200+50*inten*(1+bs*.3)),g=Math.floor(28+20*inten),b=Math.floor(45+30*inten);
    var grad=ctx.createLinearGradient(cx-85,cy-55,cx+85,cy+75);grad.addColorStop(0,'rgba('+r+','+g+','+b+',1)');grad.addColorStop(.5,'rgba('+Math.floor(r*.85)+','+Math.floor(g*.7)+','+Math.floor(b*.7)+',.85)');grad.addColorStop(1,'rgba('+Math.floor(r*.6)+','+Math.floor(g*.3)+','+Math.floor(b*.35)+',.6)');ctx.fillStyle=grad;ctx.beginPath();var first=true;
    for(var ui=0;ui<=36;ui++){var u=(ui/36)*Math.PI,pt=hp(u,v),sc=pulse,px=cx+pt.x*sc,py=cy-pt.y*sc;if(first){ctx.moveTo(px,py);first=false;}else ctx.lineTo(px,py);}
    ctx.closePath();ctx.fill();}
    var hl=ctx.createRadialGradient(cx-20,cy-55,8,cx+15,cy-15,85*pulse);hl.addColorStop(0,'rgba(255,255,255,.22)');hl.addColorStop(1,'rgba(255,0,0,0)');ctx.fillStyle=hl;ctx.beginPath();ctx.arc(cx,cy,95*pulse,0,Math.PI*2);ctx.fill();
  }
  function loop(){var now=Date.now();if(now-lb>bInt){bp=0;bs=1;lb=now;bps=68+Math.floor(Math.random()*10);bInt=60/bps*1000;document.getElementById('hrVal').textContent=bps;}bp+=0.016;bs*=.94;if(bs<.001)bs=0;draw();requestAnimationFrame(loop);}
  loop();
})();

(function(){
  var cv=document.getElementById('ecgCanvas'),ctx=cv.getContext('2d'),W=cv.width,H=cv.height,pts=new Array(W).fill(H/2),ptr=0,bc=0;
  function draw(){for(var i=0;i<3;i++){pts[ptr]=H/2;ptr=(ptr+1)%W;}bc++;if(bc>65){bc=0;for(var j=0;j<6;j++){pts[(ptr+j)%W]=H/2-10*Math.sin(j/6*Math.PI);}pts[(ptr+7)%W]=H/2+6;pts[(ptr+9)%W]=H/2-50;pts[(ptr+11)%W]=H/2+16;for(var k=0;k<10;k++){pts[(ptr+14+k)%W]=H/2-14*Math.sin(k/10*Math.PI);}}for(var n=0;n<2;n++){pts[Math.floor(Math.random()*W)]+=(Math.random()-.5)*3;}ctx.clearRect(0,0,W,H);ctx.strokeStyle='rgba(24,24,24,1)';ctx.lineWidth=.5;for(var gy=0;gy<5;gy++){var yh=H*(gy+1)/6;ctx.beginPath();ctx.moveTo(0,yh);ctx.lineTo(W,yh);ctx.stroke();}ctx.shadowColor='rgba(255,45,85,.6)';ctx.shadowBlur=3;ctx.strokeStyle='#ff2d55';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,pts[0]);for(var x=1;x<W;x++){ctx.lineTo(x,pts[(ptr+x)%W]);}ctx.stroke();ctx.shadowBlur=0;requestAnimationFrame(draw);}
  draw();
})();

// Long press
(function(){
  var hc=document.getElementById('heartCanvas'),ring=document.getElementById('pressRing'),rc=ring.querySelector('circle'),ht=document.getElementById('hintTxt'),ps=0,pr=false,trig=false,DUR=2000;
  function upd(p){rc.style.strokeDashoffset=754*(1-p);}
  hc.addEventListener('pointerdown',function(e){ps=Date.now();pr=true;trig=false;ring.classList.add('on');upd(0);ht.style.opacity=0;});
  hc.addEventListener('pointermove',function(e){if(!pr)return;var p=Math.min((Date.now()-ps)/DUR,1);upd(p);if(p>=1&&!trig){trig=true;openCal();}});
  hc.addEventListener('pointerup',function(e){pr=false;ring.classList.remove('on');upd(0);ht.style.opacity=1;});
  hc.addEventListener('pointerleave',function(e){pr=false;ring.classList.remove('on');upd(0);ht.style.opacity=1;});
  setInterval(function(){if(!pr||trig)return;var p=Math.min((Date.now()-ps)/DUR,1);upd(p);if(p>=1&&!trig){trig=true;openCal();}},100);
})();

// ===================== CALENDAR =====================
function fmtCD(y,m,d){var dt=new Date(y,m,d);return dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0');}
function prevM(){if(curM===0){curM=11;curY--;}else curM--;renderCal();}
function nextM(){if(curM===11){curM=0;curY++;}else curM++;renderCal();}
function goTodayM(){var t=new Date();curM=t.getMonth();curY=t.getFullYear();renderCal();}

function getDataMap(){
  var map={};ld('tr').forEach(function(r){if(!map[r.date])map[r.date]={tr:false,bd:false,dr:false};map[r.date].tr=true;});
  ld('bd').forEach(function(r){if(!map[r.date])map[r.date]={tr:false,bd:false,dr:false};map[r.date].bd=true;});
  ld('dr').forEach(function(r){if(!map[r.date])map[r.date]={tr:false,bd:false,dr:false};map[r.date].dr=true;});return map;
}

function renderCal(){
  document.getElementById('mLbl').textContent=curY+'年 '+(curM+1)+'月';var map=getDataMap(),today=new Date().toISOString().slice(0,10);
  var fd=new Date(curY,curM,1),ld2=new Date(curY,curM+1,0),startD=fd.getDay(),startOff=startD===0?6:startD-1,total=ld2.getDate();
  var grid=document.getElementById('calGrid'),html='',pl=new Date(curY,curM,0).getDate();
  for(var i=startOff-1;i>=0;i--){html+='<div class="cal-cell om">'+ (pl-i) +'</div>';}
  for(var d=1;d<=total;d++){var ds=fmtCD(curY,curM,d),info=map[ds],cls='cal-cell';if(ds===today)cls+=' td';
    html+='<div class="'+cls+'" onclick="openMode(\''+ds+'\')">'+d;if(info){html+='<div class="cal-dots">';if(info.tr)html+='<span class="cal-dot tr"></span>';if(info.bd)html+='<span class="cal-dot bd"></span>';if(info.dr)html+='<span class="cal-dot dr"></span>';html+='</div>';}html+='</div>';}
  var rem=7-((startOff+total)%7);if(rem<7){for(var nd=1;nd<=rem;nd++){html+='<div class="cal-cell om">'+nd+'</div>';}}
  grid.innerHTML=html;updateCalStats();updateStats();
}

function updateCalStats(){
  var prefix=curY+'-'+String(curM+1).padStart(2,'0'),tr=ld('tr'),dr=ld('dr'),tdays=0,sets=0;
  tr.forEach(function(r){if(r.date.indexOf(prefix)===0){tdays++;r.exercises.forEach(function(ex){sets+=ex.sets.length;});}});
  var dc=0;dr.forEach(function(r){if(r.date.indexOf(prefix)===0)dc++;});
  document.getElementById('cTrain').textContent=tdays;document.getElementById('cSets').textContent=sets;document.getElementById('cDiary').textContent=dc;
}

// ===================== DETAIL: TRAINING =====================
function switchTab(t){
  document.querySelectorAll('#p-detail .tab').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('#p-detail .dt-tab').forEach(function(c){c.classList.remove('on');});
  document.getElementById('tab-'+t).classList.add('on');document.getElementById('dt-'+t).classList.add('on');
  document.getElementById('saveFab').style.display=t==='train'?'':'none';
  if(t==='body')setTimeout(drawChart,100);
}

function loadExForDate(){
  var recs=ld('tr').filter(function(r){return r.date===selDate;});
  if(recs.length>0){exList=JSON.parse(JSON.stringify(recs[0].exercises));selMode=recs[0].mode||'normal';}else{exList=[];}renderEx();
}

function renderEx(){
  document.getElementById('modeBadge').textContent=MODE_LAB[selMode]||MODE_LAB.normal;
  var cards=document.getElementById('exCards'),fab=document.getElementById('saveFab');document.getElementById('quickAdd').style.display='none';
  if(exList.length===0){cards.innerHTML='<div class="empty"><div class="eicon">🏋️</div><p>还没有训练动作</p><p style="font-size:12px;">点击下方按钮添加</p></div>';fab.style.display='none';return;}
  fab.style.display='';
  cards.innerHTML=exList.map(function(ex,idx){
    var mi=MUSCLE[ex.muscle]||MUSCLE['其他'],sets=ex.sets||[];
    var sr=sets.map(function(s,si){return'<div class="set-row"><span class="snum">'+(si+1)+'组</span><div class="sval"><span class="kg">'+s.weight+'</span><span class="slbl">kg</span> <span style="color:var(--text2);">×</span> <span class="reps">'+s.reps+'</span><span class="slbl">次</span></div><button class="sdel" onclick="rmSet('+idx+','+si+')">✕</button></div>';}).join('');
    var af='<div class="add-set-row"><span class="snum">+</span><input type="number" id="sw_'+idx+'" placeholder="kg" min="0" onkeydown="if(event.key==\'Enter\')document.getElementById(\'sr_'+idx+'\').focus()"><span class="slbl">kg ×</span><input type="number" id="sr_'+idx+'" placeholder="次" min="0" onkeydown="if(event.key==\'Enter\')addSet('+idx+')"><span class="slbl">次</span><button class="as-btn" onclick="addSet('+idx+')">添加</button></div>';
    return'<div class="ex-card" style="border-left-color:'+mi.c+';"><div class="ex-top"><button class="arr-btn" onclick="toggleCard(this,'+idx+')">▼</button><div class="ex-icon" style="background:'+mi.bg+';">'+mi.ic+'</div><div class="ex-info"><div class="ex-name">'+esc2(ex.name)+'</div><div class="ex-meta">'+ex.muscle+' · '+sets.length+'组</div></div><button class="ex-del" onclick="rmEx('+idx+')">🗑</button></div><div class="sets-wrap">'+sr+af+'</div></div>';
  }).join('');
}

function showQA(){document.getElementById('quickAdd').style.display='';document.getElementById('qaName').focus();}
function cancelQA(){document.getElementById('quickAdd').style.display='none';}
function addEx(){var n=document.getElementById('qaName').value.trim(),m=document.getElementById('qaMuscle').value||'其他';if(!n){alert('请输入动作名称');return;}exList.push({name:n,muscle:m,sets:[]});renderEx();}
function rmEx(i){if(confirm('删除「'+exList[i].name+'」?')){exList.splice(i,1);renderEx();}}
function rmSet(ei,si){exList[ei].sets.splice(si,1);renderEx();}
function addSet(idx){
  var we=document.getElementById('sw_'+idx),re=document.getElementById('sr_'+idx),w=parseFloat(we.value),r=parseInt(re.value);
  if(isNaN(w)||isNaN(r)){alert('请输入重量和次数');return;}
  exList[idx].sets.push({weight:w,reps:r});var sn=exList[idx].sets.length,addRow=we.closest('.add-set-row'),wrap=addRow.parentNode;
  var nr=document.createElement('div');nr.className='set-row';nr.innerHTML='<span class="snum">'+sn+'组</span><div class="sval"><span class="kg">'+w+'</span><span class="slbl">kg</span> <span style="color:var(--text2);">×</span> <span class="reps">'+r+'</span><span class="slbl">次</span></div><button class="sdel" onclick="rmSetInline(this,'+idx+','+(sn-1)+')">✕</button>';
  wrap.insertBefore(nr,addRow);we.value='';re.value='';we.focus();addRow.querySelector('.snum').textContent=sn+1;updateCardMeta(idx);
}
function rmSetInline(btn,ei,si){exList[ei].sets.splice(si,1);renderEx();}
function updateCardMeta(idx){var cards=document.getElementById('exCards').children;if(cards[idx]){var ex=exList[idx],mi=MUSCLE[ex.muscle]||MUSCLE['其他'];cards[idx].querySelector('.ex-meta').innerHTML=ex.muscle+' · '+(ex.sets||[]).length+'组';}}
function toggleCard(btn,idx){var card=btn.closest('.ex-card'),wrap=card.querySelector('.sets-wrap');wrap.classList.toggle('folded');btn.classList.toggle('up');}

function saveWorkout(){
  if(exList.length===0){alert('请添加动作');return;}if(!exList.every(function(e){return e.sets.length>0;})){alert('每个动作至少一组');return;}
  var recs=ld('tr').filter(function(r){return r.date!==selDate;});
  recs.push({id:gid(),date:selDate,mode:selMode,exercises:JSON.parse(JSON.stringify(exList))});
  sd('tr',recs);exList=[];loadExForDate();renderCal();var btn=document.getElementById('saveFab'),orig=btn.textContent;
  btn.textContent='✅ 已保存！';btn.style.background='#4caf84';setTimeout(function(){btn.textContent=orig;btn.style.background='var(--accent2)';},1500);
}

// ===================== BODY =====================
function saveBody(){var w=document.getElementById('bw').value.trim();if(!w){alert('请填体重');return;}var eid=document.getElementById('bodyEditId').value,recs=ld('bd');function gv(id){var v=document.getElementById(id).value.trim();return v?parseFloat(v):null;}var r={id:eid||gid(),date:selDate,weight:parseFloat(w),m:{chest:gv('bc'),waist:gv('bwa'),hip:gv('bh'),leftArm:gv('bla'),rightArm:gv('bra'),leftThigh:gv('blt'),rightThigh:gv('brt')}};if(eid){var ix=recs.findIndex(function(rr){return rr.id===eid;});if(ix>=0)recs[ix]=r;}else recs.push(r);sd('bd',recs);clearBodyF();refreshBodyH();drawChart();renderCal();}
function clearBodyF(){['bw','bc','bwa','bh','bla','bra','blt','brt'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('bodyEditId').value='';}
function refreshBodyH(){var c=document.getElementById('bodyHist'),recs=ld('bd').filter(function(r){return r.date===selDate;}).sort(function(a,b){return b.id.localeCompare(a.id);});if(recs.length===0){c.innerHTML='<div class="empty"><div class="eicon">📊</div><p>暂无身体数据</p></div>';return;}var lb={chest:'胸围',waist:'腰围',hip:'臀围',leftArm:'左臂',rightArm:'右臂',leftThigh:'左腿',rightThigh:'右腿'};c.innerHTML=recs.map(function(r){var m=r.m||{},parts=['⚖️ 体重: <strong>'+r.weight+'kg</strong>'];Object.keys(lb).forEach(function(k){if(m[k]!=null)parts.push(lb[k]+': '+m[k]+'cm');});return'<div class="hist-item"><div class="hl">📊 身体数据</div><div class="sm">'+parts.join(' · ')+'</div><div class="acts"><button class="btn btn-sm btn-d" onclick="delBody(\''+r.id+'\')">🗑 删除</button></div></div>';}).join('');}
function delBody(id){if(!confirm('删除?'))return;sd('bd',ld('bd').filter(function(r){return r.id!==id;}));refreshBodyH();drawChart();renderCal();}
function drawChart(){
  var box=document.getElementById('chartBox'),cv=document.getElementById('wtChart'),recs=ld('bd').sort(function(a,b){return a.date.localeCompare(b.date);});
  if(recs.length<2){box.style.display=recs.length?'':'none';return;}box.style.display='';var ctx=cv.getContext('2d'),W=cv.parentElement.clientWidth-28,H=180;
  cv.width=W*2;cv.height=H*2;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(1,0,0,1,0,0);ctx.scale(2,2);ctx.clearRect(0,0,W,H);
  var pad={t:16,r:12,b:36,l:48},pw=W-pad.l-pad.r,ph=H-pad.t-pad.b,ws=recs.map(function(r){return r.weight;}),minW=Math.floor(Math.min.apply(null,ws)-1),maxW=Math.ceil(Math.max.apply(null,ws)+1);
  if(maxW-minW<4){var mid=(maxW+minW)/2;minW=mid-3;maxW=mid+3;}function xs(i){return pad.l+(i/Math.max(recs.length-1,1))*pw;}function ys(v){return pad.t+ph-((v-minW)/(maxW-minW))*ph;}
  ctx.strokeStyle='#2c2c2e';ctx.lineWidth=.5;for(var i=0;i<=5;i++){var y=pad.t+(i/5)*ph,vl=maxW-(i/5)*(maxW-minW);ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#8e8e93';ctx.font='10px sans-serif';ctx.textAlign='right';ctx.fillText(vl.toFixed(1),pad.l-6,y+3);}
  ctx.textAlign='center';var se=Math.max(1,Math.floor(recs.length/6));recs.forEach(function(r,i){if(i%se===0||i===recs.length-1){var x=xs(i),d2=new Date(r.date+'T00:00:00');ctx.fillText((d2.getMonth()+1)+'/'+d2.getDate(),x,H-pad.b+16);ctx.beginPath();ctx.moveTo(x,H-pad.b);ctx.lineTo(x,H-pad.b+4);ctx.stroke();}});
  ctx.strokeStyle='#ff6b35';ctx.lineWidth=2;ctx.lineJoin='round';ctx.beginPath();recs.forEach(function(r,i){var x=xs(i),y=ys(r.weight);if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});ctx.stroke();
  recs.forEach(function(r,i){var x=xs(i),y=ys(r.weight);ctx.fillStyle='#ff6b35';ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fill();ctx.fillStyle='#000';ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();ctx.fillStyle='#fff';ctx.font='9px sans-serif';ctx.textAlign='center';ctx.fillText(r.weight+'kg',x,y-8);});
  ctx.strokeStyle='#8e8e93';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,H-pad.b);ctx.lineTo(W-pad.r,H-pad.b);ctx.stroke();
}

// ===================== DIARY =====================
var dComp=true,dFeel='良好';
function tglComp(){dComp=!dComp;document.getElementById('dComp').classList.toggle('on',dComp);document.getElementById('dCompLbl').textContent=dComp?'已完成 ✓':'未完成';}
function selFeel(btn){document.querySelectorAll('#feelGrp .feel-btn').forEach(function(b){b.classList.remove('sel');});btn.classList.add('sel');dFeel=btn.dataset.f;}
function saveDiary(){var p=document.getElementById('dProg').value.trim(),t=document.getElementById('dThots').value.trim();if(!p&&!t){alert('请填写进步或感想');return;}var eid=document.getElementById('diaryEditId').value,recs=ld('dr');var entry={id:eid||gid(),date:selDate,completed:dComp,feeling:dFeel,progress:p,thoughts:t};if(eid){var ix=recs.findIndex(function(r){return r.id===eid;});if(ix>=0)recs[ix]=entry;}else recs.push(entry);sd('dr',recs);clearDiaryF();refreshDiaryH();renderCal();updateStats();}
function clearDiaryF(){document.getElementById('diaryEditId').value='';document.getElementById('dProg').value='';document.getElementById('dThots').value='';dComp=true;document.getElementById('dComp').classList.add('on');document.getElementById('dCompLbl').textContent='已完成 ✓';dFeel='良好';document.querySelectorAll('#feelGrp .feel-btn').forEach(function(b){b.classList.remove('sel');});var gb=document.querySelector('#feelGrp .feel-btn[data-f="良好"]');if(gb)gb.classList.add('sel');}
function refreshDiaryH(){var c=document.getElementById('diaryHist'),recs=ld('dr').filter(function(r){return r.date===selDate;}).sort(function(a,b){return b.id.localeCompare(a.id);});if(recs.length===0){c.innerHTML='<div class="empty"><div class="eicon">📝</div><p>暂无日记</p></div>';return;}var fe={优秀:'😄',良好:'😊',一般:'😐',疲惫:'😫'};c.innerHTML=recs.map(function(r){return'<div class="diary-card"><div class="dd">📝 日记</div><div class="dm"><span>'+(r.completed!==false?'✅ 已完成':'❌ 未完成')+'</span><span>'+(fe[r.feeling]||'😊')+' '+r.feeling+'</span></div>'+(r.progress?'<div class="ds"><div class="lbl">💪 进步</div><div class="ct">'+esc2(r.progress)+'</div></div>':'')+(r.thoughts?'<div class="ds"><div class="lbl">💭 感想</div><div class="ct">'+esc2(r.thoughts)+'</div></div>':'')+'<div class="acts" style="margin-top:10px;"><button class="btn btn-sm btn-d" onclick="delDiary(\''+r.id+'\')">🗑 删除</button></div></div>';}).join('');}
function delDiary(id){if(!confirm('删除?'))return;sd('dr',ld('dr').filter(function(r){return r.id!==id;}));refreshDiaryH();renderCal();updateStats();}

// ===================== UTILS =====================
function esc2(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function updateStats(){var recs=ld('tr'),now=new Date(),prefix=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0'),wos=0,ss=0;recs.forEach(function(r){if(r.date.indexOf(prefix)===0){wos++;r.exercises.forEach(function(ex){ss+=ex.sets.length;});}});var streak=0,chk=new Date();chk.setHours(0,0,0,0);while(true){var ds2=chk.toISOString().slice(0,10);if(recs.some(function(r){return r.date===ds2;})){streak++;chk.setDate(chk.getDate()-1);}else break;}document.getElementById('sWorkouts').textContent=wos;document.getElementById('sSets').textContent=ss;document.getElementById('sStreak').textContent=streak;}

// ===================== INIT =====================
(function init(){var now=new Date();document.getElementById('todayLbl').textContent=now.getFullYear()+'年'+(now.getMonth()+1)+'月'+now.getDate()+'日';updateStats();renderCal();var gb=document.querySelector('#feelGrp .feel-btn[data-f="良好"]');if(gb)gb.classList.add('sel');window.addEventListener('resize',function(){if(document.getElementById('dt-body').classList.contains('on'))drawChart();});})();
</script>
